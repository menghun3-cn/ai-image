name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v2.0.1)'
        required: true
        default: 'v2.0.0'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ''

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Find and enter project directory
        shell: pwsh
        run: |
          Get-Location
          Get-ChildItem -Recurse -Depth 2 | Where-Object { $_.Name -eq "package.json" } | Select-Object -First 1 | ForEach-Object {
            $projectDir = $_.DirectoryName
            Write-Output "Found project at: $projectDir"
            "PROJECT_DIR=$projectDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_DIR
          npm install

      - name: Install Tauri CLI
        shell: pwsh
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build Tauri App
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_DIR
          npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'
          }
          # 移除 v 前缀
          $versionNumber = $version -replace '^v', ''
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "version_number=$versionNumber" >> $env:GITHUB_OUTPUT
          Write-Output "Version: $version"
          Write-Output "Version Number: $versionNumber"

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_DIR
          $version = '${{ steps.get_version.outputs.version }}'
          $versionNumber = '${{ steps.get_version.outputs.version_number }}'
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          
          # 获取 NSIS 安装包的文件名
          $nsisPath = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $nsisFileName = $nsisPath.Name
          
          # 计算 NSIS 安装包的签名（如果没有签名密钥，使用空字符串）
          $signature = ""
          if (Test-Path env:TAURI_SIGNING_PRIVATE_KEY) {
            # 读取文件并计算签名
            $fileBytes = [System.IO.File]::ReadAllBytes($nsisPath.FullName)
            # 这里简化处理，实际应该使用 Tauri 的签名工具
            $signature = ""
          }
          
          $json = @{
            version = $versionNumber
            notes = "See full release notes at https://github.com/menghun3-cn/ai-image/releases/tag/$version"
            pub_date = $date
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/menghun3-cn/ai-image/releases/download/$version/$nsisFileName"
              }
            }
          } | ConvertTo-Json -Depth 10
          
          $json | Out-File -FilePath "$env:PROJECT_DIR/latest.json" -Encoding UTF8
          Write-Output "Generated latest.json:"
          Get-Content "$env:PROJECT_DIR/latest.json"

      - name: Prepare artifacts for upload
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_DIR
          $artifactsDir = "${env:GITHUB_WORKSPACE}\artifacts"
          New-Item -ItemType Directory -Force -Path $artifactsDir
          
          # 复制 NSIS 安装包
          $nsisFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue
          if ($nsisFiles) {
            Copy-Item -Path $nsisFiles.FullName -Destination $artifactsDir
            Write-Output "Copied NSIS installer: $($nsisFiles.Name)"
          } else {
            Write-Output "Warning: No NSIS installer found"
          }
          
          # 复制 MSI 安装包
          $msiFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue
          if ($msiFiles) {
            Copy-Item -Path $msiFiles.FullName -Destination $artifactsDir
            Write-Output "Copied MSI installer: $($msiFiles.Name)"
          } else {
            Write-Output "Warning: No MSI installer found"
          }
          
          # 复制 latest.json
          if (Test-Path "latest.json") {
            Copy-Item -Path "latest.json" -Destination $artifactsDir
            Write-Output "Copied latest.json"
          } else {
            Write-Output "Warning: latest.json not found"
          }
          
          # 列出 artifacts 目录内容
          Write-Output "Artifacts directory contents:"
          Get-ChildItem -Path $artifactsDir

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: AI Image V2 ${{ steps.get_version.outputs.version }}
          body: |
            ## AI Image V2 ${{ steps.get_version.outputs.version }}

            ### 安装包
            - Windows NSIS 安装程序 (推荐)
            - Windows MSI 安装包

            ### 系统要求
            - Windows 10/11 64位
            - 4GB RAM
            - 500MB 可用磁盘空间

            ### 首次使用
            1. 打开设置页面配置 API Key
            2. 选择 AI 提供商
            3. 开始生成图片

            详细说明请参考 [发布说明](../../blob/main/ai-image-v2-docs/08-发布说明.md)
          files: |
            ${{ github.workspace }}/artifacts/*.exe
            ${{ github.workspace }}/artifacts/*.msi
            ${{ github.workspace }}/artifacts/latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
