name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v2.0.1)'
        required: true
        default: 'v2.0.0'

env:
  PROJECT_PATH: .

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.PROJECT_PATH }}/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clean old build artifacts
        shell: pwsh
        run: |
          if (Test-Path "./src-tauri/target/release/bundle") {
            Remove-Item -Path "./src-tauri/target/release/bundle" -Recurse -Force
            Write-Output "Cleaned old build artifacts"
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          cd ${{ env.PROJECT_PATH }}
          npm ci

      - name: Install Tauri CLI
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          args: --version

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          args: ${{ matrix.args }}
          includeDebug: false
          includeRelease: true
          # 禁用自动发布，我们手动控制 release 创建
          createRelease: false

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'
          }
          # 移除 v 前缀
          $versionNumber = $version -replace '^v', ''
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "version_number=$versionNumber" >> $env:GITHUB_OUTPUT
          Write-Output "Version: $version"
          Write-Output "Version Number: $versionNumber"

      - name: Install tauri-cli
        shell: pwsh
        run: |
          cargo install tauri-cli
          Write-Output "tauri-cli installed successfully"

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $version = '${{ steps.get_version.outputs.version }}'
          $versionNumber = '${{ steps.get_version.outputs.version_number }}'
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          
          # 获取 NSIS 安装包的文件名
          $nsisPath = Get-ChildItem -Path "${{ env.PROJECT_PATH }}/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $nsisPath) {
            Write-Error "NSIS installer not found"
            exit 1
          }
          $nsisFileName = $nsisPath.Name
          
          # 尝试使用 Tauri 签名工具生成签名
          $signature = ""
          # 从 GitHub Actions 环境获取私钥（在 env 中已定义）
          $privateKey = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          $privateKeyPassword = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
          
          if ($privateKey -and $privateKey -ne "") {
            Write-Output "Signing installer with Tauri..."
            try {
              # 将私钥写入临时文件
              $keyFile = [System.IO.Path]::GetTempFileName()
              $privateKey | Out-File -FilePath $keyFile -Encoding UTF8 -NoNewline
              
              # 使用 Tauri CLI 签名
              $sigFile = "$($nsisPath.FullName).sig"
              if ($privateKeyPassword -and $privateKeyPassword -ne "") {
                $sigOutput = & cargo tauri signer sign --private-key "$keyFile" --password "$privateKeyPassword" --file "$($nsisPath.FullName)" 2>&1
              } else {
                $sigOutput = & cargo tauri signer sign --private-key "$keyFile" --file "$($nsisPath.FullName)" 2>&1
              }
              
              if ($LASTEXITCODE -eq 0) {
                if (Test-Path $sigFile) {
                  $signature = Get-Content $sigFile -Raw
                  Write-Output "Signature generated successfully"
                } else {
                  Write-Warning "Signature file not found after signing"
                }
              } else {
                Write-Warning "Tauri signer failed with exit code $LASTEXITCODE"
                Write-Warning "Output: $sigOutput"
              }
              
              # 清理临时私钥文件
              Remove-Item -Path $keyFile -Force -ErrorAction SilentlyContinue
            } catch {
              Write-Warning "Failed to sign installer: $_"
            }
          } else {
            Write-Warning "No signing key found (TAURI_SIGNING_PRIVATE_KEY secret not set), generating unsigned latest.json"
          }
          
          $json = @{
            version = $versionNumber
            notes = "See full release notes at https://github.com/menghun3-cn/ai-image/releases/tag/$version"
            pub_date = $date
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/menghun3-cn/ai-image/releases/download/$version/$nsisFileName"
              }
            }
          } | ConvertTo-Json -Depth 10
          
          $json | Out-File -FilePath "latest.json" -Encoding UTF8
          Write-Output "Generated latest.json:"
          Get-Content "latest.json"

      - name: Prepare and upload artifacts
        shell: pwsh
        run: |
          $version = '${{ steps.get_version.outputs.version }}'
          
          # 创建发布目录
          $releaseDir = "./release-artifacts"
          New-Item -ItemType Directory -Force -Path $releaseDir
          
          # 复制 NSIS 安装包
          $nsisFile = Get-ChildItem -Path "./src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($nsisFile) {
            Copy-Item -Path $nsisFile.FullName -Destination "$releaseDir/"
            Write-Output "Copied NSIS: $($nsisFile.Name)"
          }
          
          # 复制 MSI 安装包
          if (Test-Path "./src-tauri/target/release/bundle/msi") {
            $msiFile = Get-ChildItem -Path "./src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($msiFile) {
              Copy-Item -Path $msiFile.FullName -Destination "$releaseDir/"
              Write-Output "Copied MSI: $($msiFile.Name)"
            } else {
              Write-Output "No MSI file found"
            }
          } else {
            Write-Output "MSI directory does not exist, skipping MSI"
          }
          
          # 复制 latest.json
          Copy-Item -Path "./latest.json" -Destination "$releaseDir/"
          Write-Output "Copied latest.json"
          
          # 列出发布目录内容
          Write-Output "Release artifacts:"
          Get-ChildItem -Path $releaseDir

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: AI-Image ${{ steps.get_version.outputs.version }}
          body: |
            ## AI-Image ${{ steps.get_version.outputs.version }}

            ### 安装包
            - Windows NSIS 安装程序 (推荐)
            - Windows MSI 安装包

            ### 系统要求
            - Windows 10/11 64位
            - 4GB RAM
            - 500MB 可用磁盘空间

            ### 首次使用
            1. 打开设置页面配置 API Key
            2. 选择 AI 提供商
            3. 开始生成图片

            详细说明请参考 [发布说明](../../blob/main/ai-image-v2-docs/08-发布说明.md)
          files: |
            release-artifacts/*.exe
            release-artifacts/*.msi
            release-artifacts/latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
