name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'зүҲжң¬еҸ· (дҫӢеҰӮ: v2.0.1)'
        required: true
        default: 'v2.0.0'

env:
  PROJECT_PATH: .

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.PROJECT_PATH }}/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clean old build artifacts
        shell: pwsh
        run: |
          if (Test-Path "./src-tauri/target/release/bundle") {
            Remove-Item -Path "./src-tauri/target/release/bundle" -Recurse -Force
            Write-Output "Cleaned old build artifacts"
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          cd ${{ env.PROJECT_PATH }}
          npm ci

      - name: Install Tauri CLI
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          args: --version

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          args: ${{ matrix.args }}
          includeDebug: false
          includeRelease: true
          # зҰҒз”ЁиҮӘеҠЁеҸ‘еёғпјҢжҲ‘д»¬жүӢеҠЁжҺ§еҲ¶ release еҲӣе»ә
          createRelease: false

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'
          }
          # з§»йҷӨ v еүҚзјҖ
          $versionNumber = $version -replace '^v', ''
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "version_number=$versionNumber" >> $env:GITHUB_OUTPUT
          Write-Output "Version: $version"
          Write-Output "Version Number: $versionNumber"

      - name: Generate Changelog
        id: changelog
        shell: pwsh
        run: |
          $version = '${{ steps.get_version.outputs.version }}'
          
          # иҺ·еҸ–дёҠдёҖдёӘ tag
          $lastTag = git describe --tags --abbrev=0 HEAD~1 2>$null
          if (-not $lastTag) {
            $lastTag = git rev-list --max-parents=0 HEAD
          }
          
          Write-Output "Generating changelog from $lastTag to $version"
          
          # иҺ·еҸ–жҸҗдәӨдҝЎжҒҜ
          $commits = git log "$lastTag..HEAD" --pretty=format:"%s" --no-merges
          
          # еҲҶзұ»еӯҳеӮЁ
          $features = @()
          $changes = @()
          $fixes = @()
          $others = @()
          
          foreach ($commit in $commits -split "`n") {
            $commit = $commit.Trim()
            if ($commit -match "^feat[\(:]") {
              $features += $commit
            } elseif ($commit -match "^fix[\(:]") {
              $fixes += $commit
            } elseif ($commit -match "^(refactor|perf|chore|docs|style|test)[\(:]") {
              $changes += $commit
            } elseif ($commit -ne "" -and $commit -notmatch "^Merge") {
              $others += $commit
            }
          }
          
          # з”ҹжҲҗеҸҳжӣҙж—Ҙеҝ—
          $changelog = "## AI-Image $version`n`n"
          
          $changelog += "### йҰ–ж¬ЎдҪҝз”Ё`n"
          $changelog += "1. жү“ејҖи®ҫзҪ®йЎөйқўй…ҚзҪ® API Key`n"
          $changelog += "2. йҖүжӢ© AI жҸҗдҫӣе•Ҷ`n"
          $changelog += "3. ејҖе§Ӣз”ҹжҲҗеӣҫзүҮ`n`n"
          
          if ($features.Count -gt 0) {
            $changelog += "### ж–°еҠҹиғҪ`n"
            foreach ($feat in $features) {
              $changelog += "- $feat`n"
            }
            $changelog += "`n"
          }
          
          if ($changes.Count -gt 0) {
            $changelog += "### еҸҳжӣҙ`n"
            foreach ($change in $changes) {
              $changelog += "- $change`n"
            }
            $changelog += "`n"
          }
          
          if ($fixes.Count -gt 0) {
            $changelog += "### дҝ®еӨҚ`n"
            foreach ($fix in $fixes) {
              $changelog += "- $fix`n"
            }
            $changelog += "`n"
          }
          
          if ($others.Count -gt 0) {
            $changelog += "### е…¶д»–`n"
            foreach ($other in $others) {
              $changelog += "- $other`n"
            }
            $changelog += "`n"
          }
          
          $changelog += "---`n`n"
          $changelog += "### е®үиЈ…еҢ…`n"
          $changelog += "- Windows NSIS е®үиЈ…зЁӢеәҸ (жҺЁиҚҗ)`n"
          $changelog += "- Windows MSI е®үиЈ…еҢ…`n`n"
          $changelog += "### зі»з»ҹиҰҒжұӮ`n"
          $changelog += "- Windows 10/11 64дҪҚ`n"
          $changelog += "- 4GB RAM`n"
          $changelog += "- 500MB еҸҜз”ЁзЈҒзӣҳз©әй—ҙ`n`n"
          $changelog += "иҜҰз»ҶиҜҙжҳҺиҜ·еҸӮиҖғ [еҸ‘еёғиҜҙжҳҺ](../../blob/main/ai-image-v2-docs/08-еҸ‘еёғиҜҙжҳҺ.md)"
          
          # иҫ“еҮәеҲ°ж–Үд»¶
          $changelog | Out-File -FilePath "CHANGELOG_RELEASE.md" -Encoding UTF8
          
          # и®ҫзҪ®иҫ“еҮәеҸҳйҮҸпјҲеӨҡиЎҢеӨ„зҗҶпјү
          $changelogEscaped = $changelog -replace '`n', '%0A' -replace '`r', ''
          Write-Output "changelog=$changelogEscaped" >> $env:GITHUB_OUTPUT
          
          Write-Output "Generated Changelog:"
          Get-Content "CHANGELOG_RELEASE.md"

      - name: Install tauri-cli
        shell: pwsh
        run: |
          cargo install tauri-cli
          Write-Output "tauri-cli installed successfully"

      - name: Generate latest.json for updater
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = '${{ steps.get_version.outputs.version }}'
          $versionNumber = '${{ steps.get_version.outputs.version_number }}'
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          
          # иҺ·еҸ– NSIS е®үиЈ…еҢ…зҡ„ж–Үд»¶еҗҚ
          $nsisPath = Get-ChildItem -Path "${{ env.PROJECT_PATH }}/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $nsisPath) {
            Write-Error "NSIS installer not found"
            exit 1
          }
          $nsisFileName = $nsisPath.Name
          
          # е°қиҜ•дҪҝз”Ё Tauri зӯҫеҗҚе·Ҙе…·з”ҹжҲҗзӯҫеҗҚ
          $signature = ""
          $privateKey = $env:TAURI_SIGNING_PRIVATE_KEY
          $privateKeyPassword = $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          
          if ($privateKey -and $privateKey -ne "") {
            Write-Output "Signing installer with Tauri..."
            Write-Output "Private key length: $($privateKey.Length)"
            try {
              # дҪҝз”Ё Tauri CLI зӯҫеҗҚ - зӣҙжҺҘдҪҝз”ЁзҺҜеўғеҸҳйҮҸ
              $sigFile = "$($nsisPath.FullName).sig"
              if ($privateKeyPassword -and $privateKeyPassword -ne "") {
                $sigOutput = & cargo tauri signer sign -k "$privateKey" -p "$privateKeyPassword" "$($nsisPath.FullName)" 2>&1
              } else {
                $sigOutput = & cargo tauri signer sign -k "$privateKey" "$($nsisPath.FullName)" 2>&1
              }
              
              if ($LASTEXITCODE -eq 0) {
                if (Test-Path $sigFile) {
                  $signature = Get-Content $sigFile -Raw
                  Write-Output "Signature generated successfully"
                  Write-Output "Signature length: $($signature.Length)"
                } else {
                  Write-Warning "Signature file not found after signing"
                }
              } else {
                Write-Warning "Tauri signer failed with exit code $LASTEXITCODE"
                Write-Warning "Output: $sigOutput"
              }
            } catch {
              Write-Warning "Failed to sign installer: $_"
            }
          } else {
            Write-Warning "No signing key found (TAURI_SIGNING_PRIVATE_KEY secret not set), generating unsigned latest.json"
          }
          
          # иҜ»еҸ–з”ҹжҲҗзҡ„ changelog еҶ…е®№
          $changelogContent = Get-Content -Path "CHANGELOG_RELEASE.md" -Raw -Encoding UTF8
          
          # зЎ®дҝқж—Ҙжңҹж јејҸжӯЈзЎ® (ISO 8601)
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
          
          $json = @{
            version = $versionNumber
            notes = $changelogContent
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/menghun3-cn/ai-image/releases/download/$version/$nsisFileName"
              }
            }
          } | ConvertTo-Json -Depth 10
          
          $json | Out-File -FilePath "latest.json" -Encoding UTF8
          Write-Output "Generated latest.json:"
          Get-Content "latest.json"

      - name: Prepare and upload artifacts
        shell: pwsh
        run: |
          $version = '${{ steps.get_version.outputs.version }}'
          
          # еҲӣе»әеҸ‘еёғзӣ®еҪ•
          $releaseDir = "./release-artifacts"
          New-Item -ItemType Directory -Force -Path $releaseDir
          
          # еӨҚеҲ¶ NSIS е®үиЈ…еҢ…
          $nsisFile = Get-ChildItem -Path "./src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($nsisFile) {
            Copy-Item -Path $nsisFile.FullName -Destination "$releaseDir/"
            Write-Output "Copied NSIS: $($nsisFile.Name)"
          }
          
          # еӨҚеҲ¶ MSI е®үиЈ…еҢ…
          if (Test-Path "./src-tauri/target/release/bundle/msi") {
            $msiFile = Get-ChildItem -Path "./src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($msiFile) {
              Copy-Item -Path $msiFile.FullName -Destination "$releaseDir/"
              Write-Output "Copied MSI: $($msiFile.Name)"
            } else {
              Write-Output "No MSI file found"
            }
          } else {
            Write-Output "MSI directory does not exist, skipping MSI"
          }
          
          # еӨҚеҲ¶ latest.json
          Copy-Item -Path "./latest.json" -Destination "$releaseDir/"
          Write-Output "Copied latest.json"
          
          # еҲ—еҮәеҸ‘еёғзӣ®еҪ•еҶ…е®№
          Write-Output "Release artifacts:"
          Get-ChildItem -Path $releaseDir

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: AI-Image ${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG_RELEASE.md
          files: |
            release-artifacts/*.exe
            release-artifacts/*.msi
            release-artifacts/latest.json
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
