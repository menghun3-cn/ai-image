name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v2.0.1)'
        required: true
        default: 'v2.0.0'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ''

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd ai-image-v2
          npm install

      - name: Install Tauri CLI
        shell: pwsh
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build Tauri App
        shell: pwsh
        run: |
          cd ai-image-v2
          npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'
          }
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "Version: $version"

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: AI Image V2 ${{ steps.get_version.outputs.version }}
          body: |
            ## AI Image V2 ${{ steps.get_version.outputs.version }}

            ### 安装包
            - Windows NSIS 安装程序 (推荐)
            - Windows MSI 安装包

            ### 系统要求
            - Windows 10/11 64位
            - 4GB RAM
            - 500MB 可用磁盘空间

            ### 首次使用
            1. 打开设置页面配置 API Key
            2. 选择 AI 提供商
            3. 开始生成图片

            详细说明请参考 [发布说明](../../blob/main/ai-image-v2-docs/08-发布说明.md)
          files: |
            ai-image-v2/src-tauri/target/release/bundle/nsis/*.exe
            ai-image-v2/src-tauri/target/release/bundle/msi/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
